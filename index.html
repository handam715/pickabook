<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포차코의 도서관 탐험 - 랜덤 도서번호 뽑기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Google Fonts에서 Jua 서체 불러오기 */
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fff9;
        }

        .digit-slot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse-yellow {
            0%, 100% { border-color: #fde047; background-color: #fefce8; }
            50% { border-color: #fbbf24; background-color: #fef9c3; }
        }

        .spinning {
            animation: pulse-yellow 0.2s infinite;
        }

        /* 버튼과 텍스트의 가독성을 위한 미세 조정 */
        h1, h2, p, button {
            letter-spacing: 0.02em;
        }

        /* 이미지 로드 실패 시 이모티콘 크기 조정 */
        .fallback-icon {
            font-size: 4rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border-8 border-white">
        <!-- Header -->
        <div class="bg-[#4ade80] p-6 text-white text-center relative">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
                포차코와 도서관 탐험
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </h1>
            <p class="text-sm opacity-90 mt-1">어떤 책이 나를 기다리고 있을까?</p>
        </div>

        <div class="p-8 text-center">
            <!-- Character Image Container -->
            <div class="relative w-48 h-48 mx-auto mb-4 flex items-center justify-center overflow-hidden">
                <!-- 가장 확실한 Raw 주소로 변경했습니다 -->
                <img id="pochacco-img" 
                     src="https://raw.githubusercontent.com/handam715/pickabook/main/pickabook.png" 
                     alt="Pochacco" 
                     class="max-w-full max-h-full object-contain drop-shadow-xl transition-opacity duration-500"
                     onerror="handleImageError(this)">
            </div>

            <!-- Status Message -->
            <div id="status-box" class="bg-[#f0fff9] rounded-2xl p-4 mb-8 border-2 border-[#4ade80] border-dashed">
                <p id="status-text" class="text-lg font-bold text-[#2d6a4f]">첫 번째 숫자를 뽑아볼까요?</p>
            </div>

            <!-- Digits Display -->
            <div class="flex justify-center gap-4 mb-8">
                <div id="digit-0" class="digit-slot w-20 h-28 bg-slate-50 text-slate-200 border-4 border-slate-100 rounded-2xl flex items-center justify-center text-5xl font-black">?</div>
                <div id="digit-1" class="digit-slot w-20 h-28 bg-slate-50 text-slate-200 border-4 border-slate-100 rounded-2xl flex items-center justify-center text-5xl font-black">?</div>
                <div id="digit-2" class="digit-slot w-20 h-28 bg-slate-50 text-slate-200 border-4 border-slate-100 rounded-2xl flex items-center justify-center text-5xl font-black">?</div>
            </div>

            <!-- Result Section -->
            <div id="result-area" class="hidden animate-in fade-in zoom-in duration-500">
                <div id="kdc-card" class="p-6 rounded-3xl mb-4 text-center border-2 border-white shadow-sm">
                    <p id="kdc-range" class="text-sm text-slate-500 font-bold uppercase tracking-wider mb-1"></p>
                    <h2 id="kdc-title" class="text-2xl font-black text-slate-800 mb-2"></h2>
                    <p id="kdc-desc" class="text-slate-600 leading-tight"></p>
                </div>
                
                <div class="bg-white border-2 border-[#4ade80] p-4 rounded-2xl mb-6 flex items-start gap-3 text-left">
                    <i data-lucide="search" class="w-6 h-6 text-[#4ade80] shrink-0 mt-1"></i>
                    <div>
                        <p class="font-bold text-[#2d6a4f]">서가에서 찾아보세요!</p>
                        <p class="text-sm text-slate-600">책등의 번호가 <span id="final-number" class="font-bold text-black"></span>로 시작하는 곳에 행운의 책이 있어요.</p>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="action-btn" class="w-full py-4 bg-[#4ade80] text-white rounded-2xl text-xl font-bold transition-all transform active:scale-95 flex items-center justify-center gap-2 shadow-lg hover:bg-[#22c55e]">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                <span id="btn-text">번호 뽑기!</span>
            </button>

            <button id="reset-btn" class="hidden w-full mt-3 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition-colors">
                처음부터 다시하기
            </button>
        </div>

        <!-- Footer -->
        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <div class="flex items-center justify-center gap-1 text-[10px] text-slate-400 font-medium">
                <i data-lucide="library" class="w-3 h-3"></i>
                KOREAN DECIMAL CLASSIFICATION (KDC)
            </div>
        </div>
    </div>

    <script>
        const KDC_CLASSES = {
            0: { title: "총류", desc: "백과사전, 컴퓨터, 도서관 이야기", color: "bg-gray-100" },
            1: { title: "철학", desc: "생각하는 힘, 마음과 심리", color: "bg-pink-100" },
            2: { title: "종교", desc: "다양한 세상의 종교 이야기", color: "bg-purple-100" },
            3: { title: "사회과학", desc: "우리가 사는 세상, 경제, 법", color: "bg-blue-100" },
            4: { title: "자연과학", desc: "동물, 식물, 우주와 과학", color: "bg-green-100" },
            5: { title: "기술과학", desc: "발명, 요리, 의학, 만들기", color: "bg-orange-100" },
            6: { title: "예술", desc: "그림, 음악, 운동, 만화", color: "bg-yellow-100" },
            7: { title: "언어", desc: "우리말과 외국어 공부", color: "bg-indigo-100" },
            8: { title: "문학", desc: "재미있는 소설, 시, 이야기책", color: "bg-red-100" },
            9: { title: "역사", desc: "옛날 이야기, 세계 여행", color: "bg-amber-100" }
        };

        let step = 0;
        let digits = [null, null, null];
        let isSpinning = false;

        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('action-btn');
        const btnText = document.getElementById('btn-text');
        const resetBtn = document.getElementById('reset-btn');
        const resultArea = document.getElementById('result-area');

        lucide.createIcons();

        // 이미지 오류 처리를 위한 함수
        function handleImageError(img) {
            img.onerror = null;
            // 이미지가 정말 안 나올 경우를 대비해 텍스트나 큰 이모티콘으로 대체
            img.parentElement.innerHTML = '<span class="text-6xl">🐶</span><p class="text-xs mt-2 text-slate-400">이미지 로딩 중...</p>';
        }

        function updateStepText() {
            const texts = ["첫 번째 숫자를 뽑아볼까요?", "두 번째 숫자는 무엇일까요?", "마지막 숫자를 확인해요!", "오늘의 행운 번호 완성!"];
            statusText.innerText = texts[step];
        }

        function spin(digitIndex) {
            isSpinning = true;
            actionBtn.disabled = true;
            actionBtn.classList.add('opacity-50', 'cursor-not-allowed');
            btnText.innerText = "번호를 고르는 중...";

            const element = document.getElementById(`digit-${digitIndex}`);
            element.classList.add('spinning', 'text-yellow-400');
            element.classList.remove('text-slate-200');

            let count = 0;
            const interval = setInterval(() => {
                element.innerText = Math.floor(Math.random() * 10);
                count++;
            }, 50);

            setTimeout(() => {
                clearInterval(interval);
                const finalDigit = Math.floor(Math.random() * 10);
                digits[digitIndex] = finalDigit;
                element.innerText = finalDigit;
                element.classList.remove('spinning', 'text-yellow-400', 'bg-slate-50', 'border-slate-100');
                element.classList.add('bg-white', 'text-[#4ade80]', 'border-[#4ade80]');
                
                isSpinning = false;
                step++;
                
                if (step < 3) {
                    actionBtn.disabled = false;
                    actionBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnText.innerText = "번호 뽑기!";
                    updateStepText();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            updateStepText();
            actionBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            resultArea.classList.remove('hidden');

            const firstDigit = digits[0];
            const info = KDC_CLASSES[firstDigit];
            
            const kdcCard = document.getElementById('kdc-card');
            kdcCard.className = `p-6 rounded-3xl mb-4 text-center border-2 border-white shadow-sm ${info.color}`;
            document.getElementById('kdc-range').innerText = `${firstDigit}00번대 서가로 가요!`;
            document.getElementById('kdc-title').innerText = info.title;
            document.getElementById('kdc-desc').innerText = info.desc;
            document.getElementById('final-number').innerText = digits.join("");
        }

        actionBtn.addEventListener('click', () => {
            if (!isSpinning && step < 3) spin(step);
        });

        resetBtn.addEventListener('click', () => {
            step = 0; digits = [null, null, null]; isSpinning = false;
            for (let i = 0; i < 3; i++) {
                const el = document.getElementById(`digit-${i}`);
                el.innerText = "?";
                el.className = "digit-slot w-20 h-28 bg-slate-50 text-slate-200 border-4 border-slate-100 rounded-2xl flex items-center justify-center text-5xl font-black";
            }
            actionBtn.classList.remove('hidden', 'opacity-50', 'cursor-not-allowed');
            actionBtn.disabled = false;
            btnText.innerText = "번호 뽑기!";
            resetBtn.classList.add('hidden');
            resultArea.classList.add('hidden');
            updateStepText();
        });
    </script>
</body>
</html>
