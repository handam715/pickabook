<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포차코의 도서관 탐험 - 랜덤 도서번호 뽑기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Google Fonts에서 Jua 서체 불러오기 */
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        :root {
            /* 포차코 이미지에서 추출한 컬러 팔레트 */
            --pochacco-mint: #79D2A6; /* 메인 민트색 */
            --pochacco-mint-dark: #56A37B; /* 포인트 및 버튼용 진한 민트 */
            --pochacco-mint-soft: #E0F4EA; /* 부드러운 배경용 */
            --pochacco-black: #333333; /* 텍스트 및 선 색상 */
            --pochacco-cream: #FFFDF7; /* 전체 배경색 */
        }

        body {
            font-family: 'Jua', sans-serif;
            background-color: var(--pochacco-mint-soft);
            color: var(--pochacco-black);
        }

        .digit-slot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-color: #E2E8F0;
        }

        @keyframes pulse-yellow {
            0%, 100% { border-color: #FDE047; background-color: #FEFCE8; }
            50% { border-color: #FACC15; background-color: #FEF9C3; }
        }

        .spinning {
            animation: pulse-yellow 0.2s infinite;
        }

        /* 버튼과 텍스트의 가독성을 위한 미세 조정 */
        h1, h2, p, button {
            letter-spacing: 0.02em;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #E0F4EA 25%, #79D2A6 50%, #E0F4EA 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 커스텀 버튼 색상 */
        .btn-pochacco {
            background-color: var(--pochacco-mint);
            color: white;
            box-shadow: 0 4px 0px var(--pochacco-mint-dark);
        }
        .btn-pochacco:hover {
            background-color: var(--pochacco-mint-dark);
        }
        .btn-pochacco:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-[#FFFDF7] rounded-[40px] shadow-2xl overflow-hidden border-8 border-white">
        <!-- Header -->
        <div class="bg-[#79D2A6] p-6 text-white text-center relative border-b-4 border-[#56A37B]/20">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2 drop-shadow-sm">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
                포차코와 도서관 탐험
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </h1>
            <p class="text-sm opacity-90 mt-1">어떤 책이 나를 기다리고 있을까?</p>
        </div>

        <div class="p-8 text-center">
            <!-- Character Image Container -->
            <div id="image-container" class="relative w-full h-48 mx-auto mb-6 flex flex-col items-center justify-center overflow-hidden">
                <img id="pochacco-img" 
                     src="https://github.com/handam715/pickabook/blob/main/pickabook.png?raw=true" 
                     alt="Pochacco" 
                     class="max-w-full max-h-full object-contain drop-shadow-xl transition-all duration-700 opacity-0 scale-110"
                     onload="this.classList.remove('opacity-0'); document.getElementById('image-placeholder').classList.add('hidden');"
                     onerror="handleImageError(this)">
                
                <!-- 로딩 중 플레이스홀더 -->
                <div id="image-placeholder" class="absolute inset-0 flex flex-col items-center justify-center loading-shimmer rounded-3xl">
                    <span class="text-4xl mb-2">🐶</span>
                    <p class="text-xs text-green-700">포차코가 오고 있어요...</p>
                </div>
            </div>

            <!-- Status Message -->
            <div id="status-box" class="bg-[#E0F4EA] rounded-3xl p-4 mb-8 border-2 border-[#79D2A6] border-dashed">
                <p id="status-text" class="text-lg font-bold text-[#2D5A44]">첫 번째 숫자를 뽑아볼까요?</p>
            </div>

            <!-- Digits Display -->
            <div class="flex justify-center gap-4 mb-8">
                <div id="digit-0" class="digit-slot w-20 h-28 bg-[#F8FAFC] text-[#CBD5E1] border-4 rounded-2xl flex items-center justify-center text-5xl font-black">?</div>
                <div id="digit-1" class="digit-slot w-20 h-28 bg-[#F8FAFC] text-[#CBD5E1] border-4 rounded-2xl flex items-center justify-center text-5xl font-black">?</div>
                <div id="digit-2" class="digit-slot w-20 h-28 bg-[#F8FAFC] text-[#CBD5E1] border-4 rounded-2xl flex items-center justify-center text-5xl font-black">?</div>
            </div>

            <!-- Result Section -->
            <div id="result-area" class="hidden animate-in fade-in zoom-in duration-500">
                <div id="kdc-card" class="p-6 rounded-3xl mb-4 text-center border-2 border-white shadow-md">
                    <p id="kdc-range" class="text-sm text-[#56A37B] font-bold uppercase tracking-wider mb-1"></p>
                    <h2 id="kdc-title" class="text-2xl font-black text-slate-800 mb-2"></h2>
                    <p id="kdc-desc" class="text-slate-600 leading-tight"></p>
                </div>
                
                <div class="bg-[#FDFCF6] border-2 border-[#79D2A6] p-4 rounded-2xl mb-6 flex items-start gap-3 text-left shadow-sm">
                    <i data-lucide="search" class="w-6 h-6 text-[#79D2A6] shrink-0 mt-1"></i>
                    <div>
                        <p class="font-bold text-[#2D5A44]">서가에서 찾아보세요!</p>
                        <p class="text-sm text-slate-600 font-sans">책등의 번호가 <span id="final-number" class="font-bold text-[#333]"></span>로 시작하는 곳에 행운의 책이 있어요.</p>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="action-btn" class="btn-pochacco w-full py-4 rounded-2xl text-xl font-bold transition-all flex items-center justify-center gap-2">
                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                <span id="btn-text">번호 뽑기!</span>
            </button>

            <button id="reset-btn" class="hidden w-full mt-4 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition-colors shadow-sm">
                처음부터 다시하기
            </button>
        </div>

        <!-- Footer -->
        <div class="bg-[#F8FAF9] p-4 text-center border-t border-slate-100">
            <div class="flex items-center justify-center gap-1 text-[10px] text-[#56A37B] font-medium opacity-70">
                <i data-lucide="library" class="w-3 h-3"></i>
                KOREAN DECIMAL CLASSIFICATION (KDC)
            </div>
        </div>
    </div>

    <script>
        const KDC_CLASSES = {
            0: { title: "총류", desc: "백과사전, 컴퓨터, 도서관 이야기", color: "bg-slate-50" },
            1: { title: "철학", desc: "생각하는 힘, 마음과 심리", color: "bg-pink-50" },
            2: { title: "종교", desc: "다양한 세상의 종교 이야기", color: "bg-purple-50" },
            3: { title: "사회과학", desc: "우리가 사는 세상, 경제, 법", color: "bg-blue-50" },
            4: { title: "자연과학", desc: "동물, 식물, 우주와 과학", color: "bg-green-50" },
            5: { title: "기술과학", desc: "발명, 요리, 의학, 만들기", color: "bg-orange-50" },
            6: { title: "예술", desc: "그림, 음악, 운동, 만화", color: "bg-yellow-50" },
            7: { title: "언어", desc: "우리말과 외국어 공부", color: "bg-indigo-50" },
            8: { title: "문학", desc: "재미있는 소설, 시, 이야기책", color: "bg-red-50" },
            9: { title: "역사", desc: "옛날 이야기, 세계 여행", color: "bg-amber-50" }
        };

        let step = 0;
        let digits = [null, null, null];
        let isSpinning = false;

        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('action-btn');
        const btnText = document.getElementById('btn-text');
        const resetBtn = document.getElementById('reset-btn');
        const resultArea = document.getElementById('result-area');

        lucide.createIcons();

        function handleImageError(img) {
            img.onerror = null;
            const placeholder = document.getElementById('image-placeholder');
            placeholder.classList.remove('loading-shimmer');
            placeholder.classList.remove('hidden');
            placeholder.innerHTML = '<span class="text-6xl">🐶</span><p class="text-sm mt-3 text-slate-500 text-center">이미지를 불러올 수 없어요.<br>주소를 확인해주세요!</p>';
        }

        function updateStepText() {
            const texts = ["첫 번째 숫자를 뽑아볼까요?", "두 번째 숫자는 무엇일까요?", "마지막 숫자를 확인해요!", "오늘의 행운 번호 완성!"];
            statusText.innerText = texts[step];
        }

        function spin(digitIndex) {
            isSpinning = true;
            actionBtn.disabled = true;
            actionBtn.classList.add('opacity-50', 'cursor-not-allowed');
            btnText.innerText = "번호를 고르는 중...";

            const element = document.getElementById(`digit-${digitIndex}`);
            element.classList.add('spinning', 'text-[#79D2A6]');
            element.classList.remove('text-[#CBD5E1]');

            let count = 0;
            const interval = setInterval(() => {
                element.innerText = Math.floor(Math.random() * 10);
                count++;
            }, 50);

            setTimeout(() => {
                clearInterval(interval);
                const finalDigit = Math.floor(Math.random() * 10);
                digits[digitIndex] = finalDigit;
                element.innerText = finalDigit;
                element.classList.remove('spinning', 'text-[#79D2A6]', 'bg-[#F8FAFC]');
                element.classList.add('bg-white', 'text-[#56A37B]', 'border-[#79D2A6]');
                
                isSpinning = false;
                step++;
                
                if (step < 3) {
                    actionBtn.disabled = false;
                    actionBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnText.innerText = "번호 뽑기!";
                    updateStepText();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            updateStepText();
            actionBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            resultArea.classList.remove('hidden');

            const firstDigit = digits[0];
            const info = KDC_CLASSES[firstDigit];
            
            const kdcCard = document.getElementById('kdc-card');
            kdcCard.className = `p-6 rounded-3xl mb-4 text-center border-2 border-white shadow-md ${info.color}`;
            document.getElementById('kdc-range').innerText = `${firstDigit}00번대 서가로 가요!`;
            document.getElementById('kdc-title').innerText = info.title;
            document.getElementById('kdc-desc').innerText = info.desc;
            document.getElementById('final-number').innerText = digits.join("");
        }

        actionBtn.addEventListener('click', () => {
            if (!isSpinning && step < 3) spin(step);
        });

        resetBtn.addEventListener('click', () => {
            step = 0; digits = [null, null, null]; isSpinning = false;
            for (let i = 0; i < 3; i++) {
                const el = document.getElementById(`digit-${i}`);
                el.innerText = "?";
                el.className = "digit-slot w-20 h-28 bg-[#F8FAFC] text-[#CBD5E1] border-4 rounded-2xl flex items-center justify-center text-5xl font-black";
            }
            actionBtn.classList.remove('hidden', 'opacity-50', 'cursor-not-allowed');
            actionBtn.disabled = false;
            btnText.innerText = "번호 뽑기!";
            resetBtn.classList.add('hidden');
            resultArea.classList.add('hidden');
            updateStepText();
        });
    </script>
</body>
</html>
